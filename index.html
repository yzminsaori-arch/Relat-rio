<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio YB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>

    <main id="auth-container" class="auth-container">
        <section id="login-view" class="glass-card fadeIn">
            <h1 class="glass-card__title">SISTEMA</h1>
            <form id="login-form" class="glass-form">
                <div class="input-group">
                    <input type="text" id="username" required placeholder=" ">
                    <label>Usuário</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label>Senha</label>
                </div>
                <button type="submit" class="btn-elite">ACESSAR</button>
                <div class="glass-form__footer">
                    <button type="button" id="go-to-register" class="link-btn">Criar Conta</button>
                </div>
                <p id="login-error" class="error-msg hidden">Acesso Negado: Credenciais Inválidas</p>
            </form>
        </section>

        <section id="register-view" class="glass-card hidden fadeIn">
            <h1 class="glass-card__title">CADASTRO</h1>
            <form id="register-form" class="glass-form">
                <div class="input-group"><input type="text" id="reg-username" required placeholder=" "><label>Usuário</label></div>
                <div class="input-group"><input type="password" id="reg-password" required placeholder=" "><label>Senha</label></div>
                <button type="submit" class="btn-elite">FINALIZAR</button>
                <button type="button" id="back-to-login" class="link-btn">Voltar</button>
            </form>
        </section>
    </main>

    <div id="app-view" class="app-shell hidden">
        <header class="glass-header">
            <h2>SVETLANA.SYS</h2>
            <button id="btn-logout" class="btn-logout">EXIT</button>
        </header>
        <div id="project-grid" class="grid-layout"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
