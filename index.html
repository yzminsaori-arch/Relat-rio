<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Portfólio de Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>

    <div id="lightbox" class="lightbox hidden">
        <button id="btn-lightbox-close" class="lightbox__close">×</button>
        <img id="lightbox-img" class="lightbox__img" src="" alt="">
    </div>

    <main id="login-view" class="auth-view">
        <section class="glass-box">
            <h1 class="auth-title">SISTEMA</h1>
            <form id="login-form" class="auth-form">
                <input type="text" id="username" class="auth-input" placeholder="Usuário" required>
                <input type="password" id="password" class="auth-input" placeholder="Senha" required>
                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me"> Lembrar acesso
                    </label>
                    <button type="button" id="btn-forgot-link" class="link-btn">Esqueci a senha</button>
                </div>
                <button type="submit" class="btn-primary">Acessar Sistema</button>
                <div class="register-link">
                    <p>Novo aqui? <button type="button" id="go-to-register" class="link-btn">Criar Conta</button></p>
                </div>
                <p id="login-error" class="error-msg hidden">Acesso Negado.</p>
            </form>
        </section>
    </main>

    <main id="register-view" class="auth-view hidden">
        <section class="glass-box">
            <h1 class="auth-title">CADASTRO</h1>
            <form id="register-form" class="auth-form">
                <input type="text" id="reg-username" class="auth-input" placeholder="Usuário" required>
                <input type="password" id="reg-password" class="auth-input" placeholder="Senha" required>
                <input type="text" id="reg-cpf" class="auth-input" placeholder="CPF para recuperação" required>
                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
                <button type="button" id="back-to-login" class="link-btn mt-1">Voltar ao Login</button>
            </form>
        </section>
    </main>

    <div id="app-view" class="app hidden">
        <header class="header">
            <div class="header__top">
                <h2 class="header__logo">PORTFÓLIO</h2>
                <div class="header__controls">
                    <div class="header__profile">
                        <img id="user-avatar" class="header__avatar" src="https://ui-avatars.com/api/?name=User" alt="Avatar">
                        <span id="user-display-name" class="header__username"></span>
                    </div>
                    <button id="btn-logout" class="btn-logout">Sair</button>
                </div>
            </div>
            <nav class="header__nav">
                <button id="nav-home" class="nav-link">Início</button>
                <button id="nav-report" class="nav-link">Relatório</button>
                <button id="nav-create" class="nav-link admin-only hidden">Novo Projeto</button>
            </nav>
        </header>

        <main id="home-view" class="view">
            <div id="project-grid" class="showcase__grid"></div>
        </main>

        <main id="detail-view" class="view hidden">
            <article class="detail-card">
                <button id="btn-back-home" class="btn-secondary">Voltar</button>
                <h1 id="detail-title"></h1>
                <p id="detail-body"></p>
                <div class="interaction">
                    <button id="btn-like" class="btn-like">❤️ Curtir <span id="like-count">(0)</span></button>
                </div>
            </article>
        </main>

        <main id="form-view" class="view hidden">
            <section class="glass-box">
                <h2>Novo Projeto</h2>
                <form id="project-form" class="auth-form">
                    <input type="text" id="proj-title" class="auth-input" placeholder="Título" required>
                    <textarea id="proj-content" class="auth-input" placeholder="Conteúdo"></textarea>
                    <button type="submit" class="btn-primary">Publicar</button>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
